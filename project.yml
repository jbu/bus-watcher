name: BusWatcher
options:
  deploymentTarget:
    iOS: "26.0"
  createSchemes: false

schemes:
  BusWatcher:
    build:
      targets:
        BusWatcher: all
        BusWatcherTests: [test]
        BusWatcherUITests: [test]
      parallelizeBuild: true
    test:
      targets:
        - BusWatcherTests
        - BusWatcherUITests
    archive:
      config: Release

targets:
  BusWatcher:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/BusWatcher
      - path: Sources/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: uk.uther.apps.ios.buswatcher
        DEVELOPMENT_TEAM: DDG7JRXJYT
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "6.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: BusWatcherWidgets
        embed: true
    entitlements:
      path: BusWatcher.entitlements
      properties:
        com.apple.security.application-groups:
          - group.uk.uther.apps.ios.buswatcher
    info:
      path: Sources/BusWatcher/Info.plist
      properties:
        CFBundleIconName: AppIcon
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSExceptionDomains:
            api.tfwm.org.uk:
              NSExceptionAllowsInsecureHTTPLoads: true
        NSLocationAlwaysAndWhenInUseUsageDescription: "Shows live bus departures when you're near a stop"
        NSLocationWhenInUseUsageDescription: "Shows live bus departures when you're near a stop"
        NSSupportsLiveActivities: true
        UIBackgroundModes:
          - location

  BusWatcherWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/BusWatcherWidgets
      - path: Sources/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: uk.uther.apps.ios.buswatcher.widgets
        DEVELOPMENT_TEAM: DDG7JRXJYT
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        PROVISIONING_PROFILE_SPECIFIER: ""
    entitlements:
      path: BusWatcherWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.uk.uther.apps.ios.buswatcher
    info:
      path: Sources/BusWatcherWidgets/Info.plist
      properties:
        CFBundleDisplayName: BusWatcher Widgets
        ITSAppUsesNonExemptEncryption: false
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  BusWatcherTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/BusWatcherTests
    dependencies:
      - target: BusWatcher
    settings:
      base:
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: YES

  BusWatcherUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/BusWatcherUITests
    dependencies:
      - target: BusWatcher
    settings:
      base:
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: BusWatcher
