name: BusWatcher
options:
  deploymentTarget:
    iOS: "17.0"

targets:
  BusWatcher:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/BusWatcher
      - path: Sources/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: uk.uther.apps.buswatcher
        DEVELOPMENT_TEAM: JX8T6TSAWW
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.9"
    dependencies:
      - target: BusWatcherWidgets
        embed: true
    entitlements:
      path: BusWatcher.entitlements
      properties:
        com.apple.security.application-groups:
          - group.uk.uther.apps.buswatcher
    info:
      path: Sources/BusWatcher/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSExceptionDomains:
            api.tfwm.org.uk:
              NSExceptionAllowsInsecureHTTPLoads: true
        NSLocationAlwaysAndWhenInUseUsageDescription: "Shows live bus departures when you're near a stop"
        NSLocationWhenInUseUsageDescription: "Shows live bus departures when you're near a stop"
        NSSupportsLiveActivities: true
        UIBackgroundModes:
          - location

  BusWatcherWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.2"
    sources:
      - path: Sources/BusWatcherWidgets
      - path: Sources/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: uk.uther.apps.buswatcher.widgets
        DEVELOPMENT_TEAM: JX8T6TSAWW
        SWIFT_VERSION: "5.9"
    entitlements:
      path: BusWatcherWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.uk.uther.apps.buswatcher
    info:
      path: Sources/BusWatcherWidgets/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
